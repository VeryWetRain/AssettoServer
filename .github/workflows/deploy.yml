name: Deploy AC Server

on:
  workflow_dispatch:
    inputs:
      target:
        description: "Target host — e.g. 'ac-01' for one server, 'ac_servers' for all"
        required: true
        default: "ac_servers"
        type: string

jobs:
  build-and-deploy:
    name: Build & Deploy
    runs-on: self-hosted
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore dependencies
        run: dotnet restore

      - name: Build & publish
        run: |
          dotnet publish \
            -c Release \
            -r linux-x64 \
            --self-contained false \
            -o /tmp/build/ac-server

      - name: Deploy via Ansible
        run: |
          ansible-playbook \
            -i ${{ github.workspace }}/../ansible/inventory/hosts.yml \
            ${{ github.workspace }}/../ansible/playbooks/deploy-ac-server.yml \
            -e "target=${{ inputs.target }}" \
            -e "ac_server_binary=/tmp/build/ac-server/acServer" \
            --vault-password-file ~/.vault_pass

      - name: Clean up build artifacts
        if: always()
        run: rm -rf /tmp/build/ac-server
